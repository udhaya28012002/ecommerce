<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orders - Ecommerce Tester</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="/products.html">Products</a>
    <a href="/cart.html">Cart</a>
    <a href="/orders.html">Orders</a>
    <a href="/profile.html">Profile</a>
    <a href="#" id="logout-link">Logout</a>
  </nav>

  <main class="container">
    <h1>Your Orders</h1>

    <section id="messages"></section>

    <section style="margin-bottom:12px;">
      <label for="fetch-order-number">Fetch order by number</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="fetch-order-number" type="text" placeholder="Order number" />
        <button id="fetch-order-btn" class="btn">Fetch</button>
        <button id="refresh-orders" class="btn">Refresh List</button>
      </div>
    </section>

    <section>
      <table id="orders-table">
        <thead>
          <tr>
            <th>Order Number</th>
            <th>Ordered Date</th>
            <th>Status</th>
            <th>Final Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/guard.js"></script>
  <script src="/js/orders.js"></script>
  <script>
    guard();

    // Wire logout link
    document.getElementById('logout-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const refreshToken = localStorage.getItem('refreshToken');
      try {
        if (refreshToken) {
          await request('POST', '/api/deleteRefreshAuth', { refreshToken });
        }
      } catch (err) {
        //console.error('Logout error', err);
      } finally {
        localStorage.clear();
        window.location.href = '/index.html';
      }
    });
  </script>
</body>
</html>
